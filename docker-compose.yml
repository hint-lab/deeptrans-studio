services:
    db:
        build:
            context: ./docker/postgres-pgvector-pgroonga
        image: deeptrans/postgres-pgvector-pgroonga:18
        container_name: deeptrans-db
        environment:
            POSTGRES_USER: ${POSTGRES_USER:-postgres} # 使用 .env 中的 POSTGRES_USER 或默认值 postgres
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-123456} # 使用 .env 中的 POSTGRES_PASSWORD 或默认值 123456
            POSTGRES_DB: ${POSTGRES_DB:-deeptrans} # 使用 .env 中的 POSTGRES_DB 或默认值 deeptrans-studio
        ports:
            - '${DB_PORT:-5432}:5432' # 使用 .env 中的 DB_PORT 或默认值 5432
        volumes:
            - postgres_data:/var/lib/postgresql
        restart: unless-stopped
        networks:
            - app_local

    traefik:
        image: traefik:v3.5
        container_name: deeptrans-traefik
        ports:
            - '80:80'
            - '443:443'
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock:ro
            - traefik_data:/etc/traefik/acme
        networks:
            - web
        command:
            - '--log.level=INFO'
            - '--accesslog=true'
            - '--api.insecure=false'
            - '--providers.docker=true'
            - '--providers.docker.exposedbydefault=false'
            - '--entrypoints.web.address=:80'
            - '--entrypoints.websecure.address=:443'
            - '--certificatesresolvers.le.acme.tlschallenge=true'
            - '--certificatesresolvers.le.acme.email=wang-hao@deeptrans.studio'
            - '--certificatesresolvers.le.acme.storage=/etc/traefik/acme/acme.json'
            - '--providers.docker.network=deeptrans-studio_web'
        restart: unless-stopped

    minio:
        image: minio/minio:latest
        container_name: deeptrans-minio
        restart: always
        environment:
            MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
            MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
            MINIO_BUCKET_NAME: ${MINIO_BUCKET:-deeptrans}
        volumes:
            - minio-data:/data
        ports:
            - '${MINIO_PORT:-9002}:9000' # API 端口（默认 9002→9000，避免与其他 9000 冲突）
            - '${MINIO_CONSOLE_PORT:-9003}:9001' # 控制台端口（默认 9003→9001）
        command: minio server /data --console-address ":9001"
        healthcheck:
            test: ['CMD', 'mc', 'ready', 'local']
            interval: 30s
            timeout: 10s
            retries: 3
        networks:
            - app_local

    valkey:
        image: valkey/valkey:8-alpine
        container_name: deeptrans-valkey
        command: ['valkey-server', '--save', '60', '1', '--loglevel', 'warning']
        ports:
            - '6379:6379'
        volumes:
            - valkey-data:/data
        restart: unless-stopped
        networks:
            - app_local

    app:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: deeptrans-app
        env_file:
            - .env # 导入文件中的所有环境变量
        ports:
            - '3000:3000'
        depends_on:
            - db
            - valkey
        networks:
            - web
            - app_local
        labels:
            - 'traefik.enable=true'
            - 'traefik.http.services.studio.loadbalancer.server.port=3000'
            - 'traefik.http.routers.studio.rule=Host(`${STUDIO_HOST:-localhost}`)'
            - 'traefik.http.routers.studio.entrypoints=web'
            - 'traefik.http.routers.studio-secure.rule=Host(`${STUDIO_HOST:-localhost}`)'
            - 'traefik.http.routers.studio-secure.entrypoints=websecure'
            - 'traefik.http.routers.studio-secure.tls=true'
            - 'traefik.http.routers.studio-secure.tls.certresolver=le'
        restart: unless-stopped

    app_worker:
        build:
            context: .
            dockerfile: Dockerfile.worker
        container_name: deeptrans-app_worker
        env_file:
            - .env # 导入文件中的所有环境变量
        depends_on:
            - db
            - valkey
        networks:
            - web
            - app_local
        restart: unless-stopped

networks:
    web:
        external: false
    app_local:
        external: false
volumes:
    postgres_data:
    minio-data:
    traefik_data:
    valkey-data:
