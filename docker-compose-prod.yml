services:
    db:
        build:
            context: ./docker/postgres-pgvector-pgroonga
        image: deeptrans/postgres-pgvector-pgroonga:18
        container_name: deeptrans-db
        environment:
            POSTGRES_USER: ${POSTGRES_USER:-postgres}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-123456}
            POSTGRES_DB: ${POSTGRES_DB:-deeptrans}
        ports:
            - '${DB_PORT:-5432}:5432'
        volumes:
            - postgres_data:/var/lib/postgresql
        restart: unless-stopped
        networks:
            - app_local

    traefik:
        image: traefik:v3.5
        container_name: deeptrans-traefik
        ports:
            - '80:80'
            - '443:443'
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock:ro
            - traefik_data:/etc/traefik/acme
        networks:
            - web
        command:
            - '--log.level=DEBUG' # 改为DEBUG以便查看更多信息
            - '--accesslog=true'
            - '--api.insecure=true'
            - '--api.dashboard=true'
            - '--providers.docker=true'
            - '--providers.docker.exposedbydefault=false'
            - '--providers.docker.network=deeptrans-studio_web' # 使用完整的网络名称
            - '--entrypoints.web.address=:80'
            - '--entrypoints.web.http.redirections.entrypoint.to=websecure'
            - '--entrypoints.web.http.redirections.entrypoint.scheme=https'
            - '--entrypoints.web.http.redirections.entrypoint.permanent=true'
            - '--entrypoints.websecure.address=:443'
            - '--certificatesresolvers.le.acme.tlschallenge=true'
            - '--certificatesresolvers.le.acme.email=wang-hao@deeptrans.studio'
            - '--certificatesresolvers.le.acme.storage=/etc/traefik/acme/acme.json'
        restart: unless-stopped
        labels:
            - 'traefik.enable=true'
            - 'traefik.http.routers.traefik.rule=Host(`traefik.deeptrans.studio`)'
            - 'traefik.http.routers.traefik.service=api@internal'
            - 'traefik.http.routers.traefik.entrypoints=websecure'
            - 'traefik.http.routers.traefik.tls=true'
            - 'traefik.http.routers.traefik.tls.certresolver=le'
    valkey:
        image: valkey/valkey:8-alpine
        container_name: deeptrans-valkey
        command: ['valkey-server', '--save', '60', '1', '--loglevel', 'warning']
        ports:
            - '6379:6379'
        volumes:
            - valkey-data:/data
        restart: unless-stopped
        networks:
            - app_local

    app:
        build:
            context: .
            dockerfile: Dockerfile
        image: deeptrans-studio:latest
        container_name: deeptrans-app
        env_file:
            - .env
        environment:
            STORAGE_TYPE: cos
            STORAGE_USE_SSL: 'true'
            COS_SECRET_ID: ${COS_SECRET_ID}
            COS_SECRET_KEY: ${COS_SECRET_KEY}
            COS_BUCKET: ${COS_BUCKET}
            COS_REGION: ${COS_REGION}
            COS_APP_ID: ${COS_APP_ID:-}
            COS_DOMAIN: ${COS_DOMAIN:-}
            COS_USE_SSL: ${COS_USE_SSL:-true}
        depends_on:
            - db
            - valkey
        networks:
            - web
            - app_local
        labels:
            - 'traefik.enable=true'
            - 'traefik.http.services.app.loadbalancer.server.port=3000'
            - 'traefik.http.routers.app.rule=Host(`www.deeptrans.studio`) || Host(`deeptrans.studio`)'
            - 'traefik.http.routers.app.entrypoints=websecure'
            - 'traefik.http.routers.app.tls=true'
            - 'traefik.http.routers.app.tls.certresolver=le'
        restart: unless-stopped

    app_worker:
        build:
            context: .
            dockerfile: Dockerfile.worker
        image: deeptrans-studio-worker:latest
        container_name: deeptrans-app_worker
        env_file:
            - .env
        environment:
            STORAGE_TYPE: cos
            STORAGE_USE_SSL: 'true'
            COS_SECRET_ID: ${COS_SECRET_ID}
            COS_SECRET_KEY: ${COS_SECRET_KEY}
            COS_BUCKET: ${COS_BUCKET}
            COS_REGION: ${COS_REGION}
            COS_APP_ID: ${COS_APP_ID:-}
            COS_DOMAIN: ${COS_DOMAIN:-}
            COS_USE_SSL: ${COS_USE_SSL:-true}
        depends_on:
            - db
            - valkey
        networks:
            - app_local
        restart: unless-stopped

networks:
    web:
        external: false
    app_local:
        external: false

volumes:
    postgres_data:
    traefik_data:
    valkey-data:
